<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Monitor System</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        :root { --dispense: #dc3545; --restock: #198754; }
        body { 
            background: #e9ecef; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0;
        }
        .main-card { 
            background: #fff; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 480px; 
            overflow: hidden;
        }
        .header { background: #212529; color: white; padding: 25px; text-align: center; }
        .balance-val { color: #00ff41; font-size: 3rem; font-weight: bold; margin: 0; }
        
        .toggle-box { background: #f8f9fa; padding: 15px; display: flex; justify-content: center; border-bottom: 1px solid #eee; }
        .form-body { padding: 30px; }
        .hidden { display: none; }
        
        .form-control { border-radius: 8px; margin-bottom: 12px; padding: 12px; }
        .btn-submit { padding: 12px; font-weight: bold; border-radius: 8px; text-transform: uppercase; transition: 0.3s; }
        
        /* Toggle Styling */
        .btn-check:checked + .btn-out { background: var(--dispense) !important; color: white !important; border-color: var(--dispense) !important; }
        .btn-check:checked + .btn-in { background: var(--restock) !important; color: white !important; border-color: var(--restock) !important; }
    </style>
</head>
<body>

<div class="main-card">
    <!-- Balance Display -->
    <div class="header">
        <small class="text-muted text-uppercase">Fuel Inventory Balance</small>
        <h1 class="balance-val" id="totalDisplay">---</h1>
        <small>LITERS REMAINING</small>
    </div>

    <!-- Toggle Switch -->
    <div class="toggle-box">
        <div class="btn-group w-75">
            <input type="radio" class="btn-check" name="mode" id="modeOut" checked onchange="updateUI()">
            <label class="btn btn-outline-secondary btn-out" for="modeOut">DISPENSE</label>

            <input type="radio" class="btn-check" name="mode" id="modeIn" onchange="updateUI()">
            <label class="btn btn-outline-secondary btn-in" for="modeIn">RESTOCK</label>
        </div>
    </div>

    <!-- Centered Form -->
    <div class="form-body">
        <form id="fuelForm">
            <!-- Transaction Date -->
            <label class="small text-muted mb-1">Transaction Date</label>
            <input type="date" id="date" class="form-control" required>

            <!-- DISPENSE FIELDS: Plate, Driver, Liters, Received By -->
            <div id="dispenseSection">
                <input type="text" id="plate" class="form-control" placeholder="Plate Number">
                <input type="text" id="driver" class="form-control" placeholder="Driver Name">
                <input type="number" id="litersOut" class="form-control" placeholder="Number of Liters" step="0.01">
                <input type="text" id="receivedByOut" class="form-control" placeholder="Received By">
            </div>

            <!-- RESTOCK FIELDS: Liters, Delivered By, Received By -->
            <div id="restockSection" class="hidden">
                <input type="number" id="litersIn" class="form-control" placeholder="Number of Liters Received" step="0.01">
                <input type="text" id="deliveredBy" class="form-control" placeholder="Delivered By">
                <input type="text" id="receivedByIn" class="form-control" placeholder="Received By">
            </div>

            <button type="submit" id="btnSubmit" class="btn btn-danger w-100 btn-submit mt-3">Confirm Dispense</button>
        </form>
        <div id="feedback" class="text-center mt-3 small text-secondary">System Ready</div>
    </div>
</div>

<script>
    // 1. PASTE YOUR GOOGLE DEPLOYMENT URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz0AAfUHnPB9mAWbrlu1XvrRStIvV_yKQN0La5yrhdKa5_fH2ZdOhgFmWQs5yNfAFsc/exec";

    // Pre-fill today's date
    document.getElementById('date').valueAsDate = new Date();

    // Toggle between IN and OUT
    function updateUI() {
        const isOut = document.getElementById('modeOut').checked;
        const outSec = document.getElementById('dispenseSection');
        const inSec = document.getElementById('restockSection');
        const btn = document.getElementById('btnSubmit');

        if (isOut) {
            outSec.classList.remove('hidden');
            inSec.classList.add('hidden');
            btn.className = "btn btn-danger w-100 btn-submit mt-3";
            btn.innerText = "Confirm Dispense";
        } else {
            outSec.classList.add('hidden');
            inSec.classList.remove('hidden');
            btn.className = "btn btn-success w-100 btn-submit mt-3";
            btn.innerText = "Confirm Restock";
        }
    }

    // Load initial balance on startup
    window.onload = () => {
        fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                document.getElementById('totalDisplay').innerText = data.balance;
            })
            .catch(err => console.error("Initial load error:", err));
    };

    // Form Submission Action
    document.getElementById('fuelForm').onsubmit = function(e) {
        e.preventDefault();
        const isOut = document.getElementById('modeOut').checked;
        const feedback = document.getElementById('feedback');
        const btn = document.getElementById('btnSubmit');
        
        feedback.innerText = "Processing Transaction...";
        btn.disabled = true;
        
        const payload = {
            date: document.getElementById('date').value,
            type: isOut ? "OUT" : "IN",
            plate: isOut ? document.getElementById('plate').value : "",
            driver: isOut ? document.getElementById('driver').value : "",
            liters: isOut ? document.getElementById('litersOut').value : document.getElementById('litersIn').value,
            receivedBy: isOut ? document.getElementById('receivedByOut').value : document.getElementById('receivedByIn').value,
            deliveredBy: isOut ? "" : document.getElementById('deliveredBy').value
        };

        // Send data to Google Sheet
        fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'no-cors', // Required for cross-domain Google Script posts
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(() => {
            // Since 'no-cors' doesn't return a readable response, 
            // we manually trigger a balance refresh after 2 seconds
            feedback.innerText = "✅ Transaction Logged!";
            document.getElementById('fuelForm').reset();
            document.getElementById('date').valueAsDate = new Date();
            btn.disabled = false;
            
            setTimeout(() => {
                location.reload(); // Refresh to show new balance
            }, 2000);
        })
        .catch(error => {
            console.error('Error:', error);
            feedback.innerText = "❌ Error connecting to server.";
            btn.disabled = false;
        });
    };
</script>

</body>
</html>
